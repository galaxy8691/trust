[dependencies]
regex = "1.12"
url = "2.5"
diesel = { version = "2.2.6", features = ["sqlite"] }
libsqlite3-sys = { version = "0.30.1", features = ["bundled"] }
trust_orm_facade = { path = "crates/trust_orm_facade" }
trust_ffi_facade = { path = "crates/trust_ffi_facade" }

[[rust_binding]]
crate = "regex"
type_name = "Regex"
rust_type = "regex::Regex"
new = { rust = "regex::Regex::new", unwrap = true }
method = [
  { name = "is_match", args = ["string"], returns = "boolean" },
]

[[rust_binding]]
crate = "url"
type_name = "Url"
rust_type = "url::Url"
new = { rust = "url::Url::parse", unwrap = true }
method = [
  { name = "scheme", args = [], returns = "string" },
  { name = "path", args = [], returns = "string" },
]

# Diesel：`SimpleConnection` **没有** `establish`（只有 `batch_execute`）；`establish` 在 **`Connection`** trait 上。
# 生成 crate 未 `use diesel::Connection`，故用 UFCS，避免找不到 `establish`。
[[rust_binding]]
crate = "diesel"
type_name = "SqliteConnection"
rust_type = "diesel::sqlite::SqliteConnection"
new = { rust = "<diesel::sqlite::SqliteConnection as diesel::connection::Connection>::establish", unwrap = true }

# Diesel：链式查询、`?`、关联类型 留在 Rust（见 `examples/crates/trust_orm_facade`）；TS 只绑窄 API。
[[rust_binding]]
crate = "trust_orm_facade"
type_name = "OrmFacade"
rust_type = "trust_orm_facade::OrmFacade"
new = { rust = "trust_orm_facade::OrmFacade::new", unwrap = false }
method = [
  { name = "users_named_tom_count", args = [], returns = "number" },
]

# C FFI：`extern "C"` 在 `trust_ffi_facade` + `native/*.c`；TS 只调用 Rust 包装方法。
[[rust_binding]]
crate = "trust_ffi_facade"
type_name = "Cffi"
rust_type = "trust_ffi_facade::Cffi"
new = { rust = "trust_ffi_facade::Cffi::new", unwrap = false }
method = [
  { name = "add_nums", args = ["number", "number"], returns = "number" },
]
